version: 2
name: Satori evidence-gated remediation backlog
workflow:
  evidence_batch_limit: 5
  patch_wip_limit: 1
  reopen_wip_limit: 1
  evidence_grades:
    E0: assertion only
    E1: exact source locations
    E2: runtime/release path or repro
    E3: tests specified or existing test proof
    E4: patch + tests + original repro rerun
    E5: CI/regression guard + public contract aligned
  patch_readiness:
    P0: not patchable
    P1: verified but tests not designed
    P2: patch-ready
    P3: patch in progress
    P4: proof-ready
    P5: closed
  closure_types:
  - fixed_proven
  - false_proven
  - accepted_risk
  - parked
recommended_batches:
  batch_A:
  - F4
  - F2
  - F5
  - F6
  - F11
  batch_B:
  - F7
  - F8
  - F9
  - F10
  - F3
batch_A_evidence_status:
  investigated_at: '2026-07-09'
  control_docs:
  - docs/remediation/Satori_Evidence_Gated_Remediation_System_v2.md
  - docs/remediation/satori_remediation_backlog.v2.yaml
  scale_note: 'Evidence E0–E3 investigation; E4–E5 only after patch+proof. Patch readiness P0=not patchable … P2=patch-ready … P5=closed.'
  ranking_rule: Only E2+ scored; patch only if P2+
  recommended_next_patch: F2_final_proof_then_F9_design
  recommended_next_patch_reason: 'F2 patched_awaiting_final_proof (cli SSOT; mcp install hard-deprecated). After close: F9 parser fallback surface design. F3 parked.'
  scores_desc:
  - 'F4 score=9 E4/P5 closed fixed_proven'
  - 'F11 score=8 E4/P5 closed fixed_proven'
  - 'F5 score=7 E4/P5 closed fixed_proven (merkle-only; search ranking deferred)'
  - 'F6 score=8 E3/P5 closed accepted_risk (AGENTS+skill trust calibration)'
  - 'F7 score=E4/P5 closed fixed_proven (lifecycle.public-tools.test.ts)'
  - 'F10 score=E4/P5 closed fixed_proven (hygiene: delete noise; process docs → docs/remediation/)'
  - 'F8 score=E4/P5 closed fixed_proven (doctor packageVersions table)'
  - 'F2 score=6 E3/P4 patched_awaiting_final_proof (installer SSOT)'
  - 'F9 E2/P1 open (surface design; not patched)'
