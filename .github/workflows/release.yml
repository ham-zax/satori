name: Release

on:
  push:
    tags:
      - 'v*'
      - 'c*'

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.x'
        cache: 'pnpm'
        
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      
    - name: Setup npm auth
      run: |
        echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
      
    - name: Build packages
      run: pnpm build

    - name: Verify MCP docs are in sync
      run: pnpm -C packages/mcp docs:check

    - name: Verify server manifest is in sync
      run: pnpm -C packages/mcp manifest:check

    - name: Run MCP release smoke
      run: pnpm run release:smoke:mcp

    - name: Run CLI release smoke
      run: pnpm run release:smoke:cli
      
    - name: Publish core package to npm
      run: pnpm --filter @zokizuan/satori-core publish --access public --no-git-checks --provenance
        
    - name: Publish mcp package to npm
      run: pnpm --filter @zokizuan/satori-mcp publish --access public --no-git-checks --provenance

    - name: Publish cli package to npm
      run: pnpm --filter @zokizuan/satori-cli publish --access public --no-git-checks --provenance
