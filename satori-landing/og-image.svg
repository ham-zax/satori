<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Satori - Repo retrieval for MCP coding agents</title>
  <desc id="desc">Social preview image for Satori, a read-only MCP code retrieval system for AI coding agents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050507" />
      <stop offset="0.58" stop-color="#11151a" />
      <stop offset="1" stop-color="#020304" />
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.55" />
  <circle cx="948" cy="116" r="172" fill="#dfff00" opacity="0.12" filter="url(#glow)" />
  <circle cx="230" cy="520" r="220" fill="#00e5ff" opacity="0.1" filter="url(#glow)" />
  <path d="M 126 420 C 276 248, 430 448, 588 286 S 922 186, 1068 338" fill="none" stroke="#dfff00" stroke-width="3" opacity="0.76" />
  <path d="M 126 476 C 296 318, 432 502, 604 354 S 910 266, 1068 406" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.46" />
  <g transform="translate(84 82)">
    <text x="0" y="0" fill="#dfff00" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="28" letter-spacing="5">SATORI</text>
    <text x="0" y="126" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="78" font-weight="700">Repo retrieval for</text>
    <text x="0" y="212" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="78" font-weight="700">MCP coding agents</text>
    <text x="0" y="294" fill="rgba(255,255,255,0.72)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="34">Search code, open exact symbols, follow callers, and detect stale context before edits.</text>
  </g>
  <g transform="translate(84 514)">
    <rect width="548" height="62" fill="rgba(0,0,0,0.46)" stroke="rgba(223,255,0,0.42)" />
    <text x="24" y="40" fill="#dfff00" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23">npx @zokizuan/satori-cli install</text>
  </g>
</svg>
