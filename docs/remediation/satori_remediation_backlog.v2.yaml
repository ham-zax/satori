    repro_or_inspection: |
      node -e "const s=['file.ts','å.ts','z.ts','café','cafe'];
      console.log([...s].sort((a,b)=>a.localeCompare(b)).join('|'));
      console.log([...s].sort((a,b)=>a.localeCompare(b,'sv')).join('|'));
